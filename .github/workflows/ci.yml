name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - run: go build ./...
      - run: go vet ./...
      - run: go test -race ./... -coverprofile=coverage.out -coverpkg=./...
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.out
          fail_ci_if_error: false

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: treasury
          POSTGRES_PASSWORD: treasury
          POSTGRES_DB: treasury
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U treasury"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
      - run: go test -tags=integration -race ./test/integration/...
        env:
          DB_URL: postgres://treasury:treasury@localhost:5432/treasury?sslmode=disable
          REDIS_URL: redis://localhost:6379/0